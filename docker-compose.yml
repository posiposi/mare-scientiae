services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
      TEST_DATABASE_URL: "postgres://${TEST_POSTGRES_USER}:${TEST_POSTGRES_PASSWORD}@test-db:5432/${TEST_POSTGRES_DB}?sslmode=disable"
    command: ["go", "run", "."]
    depends_on:
      - db
      - test-db

  db:
    image: postgres:18.3
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql

  test-db:
    image: postgres:18.3
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
      POSTGRES_DB: ${TEST_POSTGRES_DB}

volumes:
  db-data:

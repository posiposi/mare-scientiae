root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  entrypoint = ["./tmp/main"]
  include_ext = ["go"]
  exclude_dir = ["tmp", ".git", ".claude", "schemas", "docs"]
  exclude_regex = ["_test\\.go"]
  delay = 1000
  stop_on_error = false
  send_interrupt = true
  kill_delay = "1s"
  poll = true

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
